    <link rel="stylesheet" href="./src/style.css" />
    <title>bouquet</title>

  <body class="bg-pink-300">
    <div>
      <svg

        viewBox="0 0 390 854"

        <desc>

        <defs>
          <style>
            .flower-group {
              cursor: pointer;
            }
            .flower-group:hover {
              filter: brightness(1.08);
            }
            text {
              font-family: var(--font-sans, sans-serif);
            }
            .title-text {
              font-size: 22px;
              font-weight: 500;
              fill: var(--color-text-primary, #1a1a1a);
            }
            .subtitle-text {
              font-size: 14px;
              font-weight: 400;
              fill: var(--color-text-secondary, #666);
            }
            .card-bg {
              fill: var(--color-background-secondary, #f5f5f5);
            }
            .card-text {
              font-size: 13px;
              fill: var(--color-text-primary, #1a1a1a);
            }
            .card-sub {
              font-size: 12px;
              fill: var(--color-text-secondary, #888);
            }
          </style>
        </defs>

        <rect width="390" height="844" fill="transparent"></rect>

        <!-- Title area -->
        <text x="195" y="48" text-anchor="middle" class="title-text" id="title">
          Why I love you
        </text>
        <text x="195" y="70" text-anchor="middle" class="subtitle-text">
          (Press the Flowers)
        </text>

        <!-- Info card -->
        <g id="info-card" opacity="0" pointer-events="none">

            x="20"
            y="780"
            width="350"
            height="52"
            rx="12"
            class="card-bg"
            stroke="none"

            y="801"
            text-anchor="middle"
            class="card-text"
            font-weight="500"
          ></text>
          <text
            id="info-desc"
            x="195"
            y="820"
            text-anchor="middle"
            class="card-sub"
          ></text>
        </g>

        <!-- ===================== STEMS ===================== -->
        <line
          x1="90"
          y1="230"
          x2="185"
          y2="620"
          stroke="#4a7c3f"
          stroke-width="3"
          stroke-linecap="round"
